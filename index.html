<!DOCTYPE html>
<html lang="zh-HK">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>花子先生網校</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      font-family:"PingFang HK","Noto Sans TC","Microsoft JhengHei",sans-serif;
      background: linear-gradient(135deg, #D48A3F 0%, #E7B07A 100%);
      min-height:100vh;
      padding:24px;
      display:flex;
      justify-content:center;
      align-items:center;
      color:#4F3B2D;
    }
    .container { width:100%; max-width:430px; }
    h1 {
      text-align:center;
      margin-bottom:24px;
      color:#B85C38;
      font-size:42px;
      font-weight:700;
    }
    .box {
      background:#F7F3EE;
      padding:32px 28px 24px;
      border-radius:28px;
      box-shadow:0 18px 45px rgba(87,55,28,0.16);
    }
    input, button {
      width:100%;
      font-size:16px;
      border-radius:16px;
    }
    input {
      padding:16px 18px;
      margin-bottom:14px;
      border:1px solid #E7D8CA;
      background:#FFFDFC;
    }
    button {
      padding:15px 18px;
      border:none;
      color:#fff;
      font-weight:600;
      background:#3E5368;
      margin-bottom:12px;
      cursor:pointer;
    }
    .forgot-link {
      display:block;
      text-align:center;
      color:#2C7BC0;
      margin:6px 0 12px;
      text-decoration:none;
    }
    .btn-secondary { background:#90A1A6; }
    .footer-text {
      text-align:center;
      margin-top:18px;
      font-size:14px;
      color:rgba(255,255,255,0.92);
      line-height:1.75;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>線上教室</h1>
    <div class="box">
      <input type="email" placeholder="你的電郵">
      <input type="password" placeholder="密碼（至少6位）">
      <button>登入</button>
      <a href="#" class="forgot-link">忘記密碼？</a>
      <button class="btn-secondary">註冊新帳號</button>
    </div>
    <div class="footer-text">
      只向本善教育 及 A元智研學生使用<br>
      花子先生管理
    </div>
  </div>
</body>
</html>
