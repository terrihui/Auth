<!DOCTYPE html>
<html lang="zh-HK">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>花子先生網校</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }

    :root{
      --bg-1:#D48A3F;
      --bg-2:#E7B07A;
      --card:#F7F3EE;
      --card-border:rgba(94, 67, 45, 0.10);
      --text:#4F3B2D;
      --muted:#8B7768;
      --title:#B85C38;
      --input-bg:#FFFDFC;
      --input-border:#E7D8CA;
      --input-focus:#D48A3F;
      --primary:#3E5368;
      --primary-hover:#31475C;
      --secondary:#90A1A6;
      --secondary-hover:#7F9197;
      --link:#2C7BC0;
      --danger:#D9534F;
      --danger-hover:#BF4541;
      --white:#ffffff;
      --shadow:0 18px 45px rgba(87, 55, 28, 0.16);
      --radius-xl:28px;
      --radius-lg:16px;
      --radius-md:12px;
    }

    body {
      font-family:"PingFang HK","Noto Sans TC","Microsoft JhengHei",sans-serif;
      background: linear-gradient(135deg, var(--bg-1) 0%, var(--bg-2) 100%);
      min-height:100vh;
      padding:24px;
      display:flex;
      flex-direction:column;
      justify-content:center;
      align-items:center;
      color:var(--text);
    }

    .container {
      width:100%;
      max-width:430px;
    }

    h1 {
      text-align:center;
      margin-bottom:24px;
      color:var(--title);
      font-size:42px;
      line-height:1.15;
      font-weight:700;
      letter-spacing:1px;
      text-shadow:0 2px 10px rgba(255,255,255,0.12);
    }

    .box {
      background:rgba(247,243,238,0.96);
      backdrop-filter: blur(4px);
      width:100%;
      padding:32px 28px 24px;
      border-radius:var(--radius-xl);
      box-shadow:var(--shadow);
      border:1px solid var(--card-border);
    }

    #login, #dashboard {
      display:flex;
      flex-direction:column;
      gap:14px;
    }

    input {
      width:100%;
      padding:16px 18px;
      border:1px solid var(--input-border);
      border-radius:var(--radius-lg);
      font-size:16px;
      background:var(--input-bg);
      color:var(--text);
      outline:none;
      transition:all 0.25s ease;
    }

    input::placeholder {
      color:#A79A90;
    }

    input:focus {
      border-color:var(--input-focus);
      box-shadow:0 0 0 4px rgba(212,138,63,0.14);
      background:#fff;
    }
