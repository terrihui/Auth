<!DOCTYPE html>
<html lang="zh-HK">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>花子先生網校</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { 
      font-family:"PingFang HK","Microsoft JhengHei",sans-serif; 
      background:#f7f1e3; 
      min-height:100vh; 
      padding:20px; 
      display:flex; 
      justify-content:center; 
      align-items:center;
    }
    .box { 
      background:white; 
      width:100%; 
      max-width:400px; 
      padding:30px; 
      border-radius:10px; 
      box-shadow:0 5px 15px rgba(0,0,0,0.1);
    }
    h1 { text-align:center; margin-bottom:20px; color:#333; }
    input { 
      width:100%; 
      padding:12px; 
      margin:10px 0; 
      border:1px solid #ddd; 
      border-radius:5px; 
      font-size:16px;
    }
    button { 
      width:100%; 
      padding:12px; 
      background:#333; 
      color:white; 
      border:none; 
      border-radius:5px; 
      font-size:16px; 
      cursor:pointer;
      margin:8px 0;
    }
    button:hover { background:#555; }
    button.danger { background:#d32f2f; }
    button.danger:hover { background:#b71c1c; }

    .forgot-link {
      display:block;
      text-align:center;
      color:#4285F4;
      margin:10px 0;
      text-decoration:none;
      font-size:14px;
    }
    .forgot-link:hover { text-decoration:underline; }

    #notice { 
      margin:15px 0; 
      padding:10px; 
      background:#fff8e1; 
      border:1px solid #ffe082; 
      border-radius:5px;
    }
    #classroom-btn { 
      display:block; 
      margin:20px 0 10px;
      padding:12px; 
      background:#4285F4; 
      color:white; 
      text-align:center; 
      text-decoration:none; 
      border-radius:5px;
    }
  </style>
</head>
<body>
  <div class="box">
    <h1>花子先生網校</h1>
    
    <!-- 登入區域 -->
    <div id="login">
      <input type="email" id="email" placeholder="你的電郵">
      <input type="password" id="password" placeholder="密碼（至少6位）">
      <button onclick="login()">登入</button>
      <a href="#" onclick="forgotPassword(); return false;" class="forgot-link">忘記密碼？</a>
      <button onclick="register()" style="background:#666;">註冊新帳號</button>
    </div>

    <!-- 登入後顯示的內容 -->
    <div id="dashboard" style="display:none;">
      <p style="text-align:center; margin-bottom:15px; color:#555;" id="welcome"></p>
      
      <div id="notice">
        📢 提醒：明天19:00有數學課，記得準時參加！
      </div>
      <a id="classroom-btn" href="https://classroom.google.com/c/Nzk2NzkyNDEyNDkx?cjc=dwgpxthq" target="_blank">
        進入你的課堂
      </a>
      <button onclick="logout()">登出</button>
      <button onclick="deleteAccount()" class="danger">🗑️ 取消帳戶（永久刪除）</button>
    </div>
  </div>

  <!-- Firebase SDK -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
    import { 
      getAuth, 
      signInWithEmailAndPassword, 
      createUserWithEmailAndPassword, 
      signOut, 
      onAuthStateChanged,
      sendPasswordResetEmail,
      deleteUser   // 新增
    } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js";

    const firebaseConfig = {
      apiKey: "AIzaSyB58QT_SabVrd4R9FVgwsnkwNlgZwWHChQ",
      authDomain: "auth-53ab7.firebaseapp.com",
      projectId: "auth-53ab7",
      storageBucket: "auth-53ab7.firebasestorage.app",
      messagingSenderId: "277804563457",
      appId: "1:277804563457:web:57123fb83eb8bac3155400"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    onAuthStateChanged(auth, (user) => {
      if (user) {
        document.getElementById('login').style.display = 'none';
        document.getElementById('dashboard').style.display = 'block';
        document.getElementById('welcome').textContent = `歡迎，${user.email}`;
      } else {
        document.getElementById('login').style.display = 'block';
        document.getElementById('dashboard').style.display = 'none';
      }
    });

    window.login = function() {
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      if (!email || !password) return alert('請填寫電郵和密碼！');
      
      signInWithEmailAndPassword(auth, email, password)
        .then(() => alert('登入成功！'))
        .catch((error) => alert('登入失敗：' + error.message));
    };

    window.register = function() {
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      if (!email || password.length < 6) return alert('請填寫有效電郵，密碼至少6位！');
      
      createUserWithEmailAndPassword(auth, email, password)
        .then(() => alert('註冊成功！現在可以登入了~'))
        .catch((error) => alert('註冊失敗：' + error.message));
    };

    window.forgotPassword = function() {
      const email = document.getElementById('email').value;
      if (!email) return alert('請先輸入你的電郵地址');

      sendPasswordResetEmail(auth, email)
        .then(() => alert('✅ 重設密碼電郵已發送！\n請檢查你的郵箱（包括垃圾郵件）'))
        .catch((error) => alert('發送失敗：' + error.message));
    };

    window.logout = function() {
      signOut(auth).then(() => alert('已登出！'));
    };

    // ==================== 取消帳戶（永久刪除） ====================
    window.deleteAccount = function() {
      if (!confirm('⚠️ 確定要永久刪除你的帳戶嗎？\n\n呢個動作冇得反悔，所有資料都會消失！')) {
        return;
      }

      const user = auth.currentUser;
      if (user) {
        user.delete()
          .then(() => {
            alert('✅ 帳戶已成功永久刪除。');
          })
          .catch((error) => {
            if (error.code === 'auth/requires-recent-login') {
              alert('基於安全原因，請先登出，再重新登入，之後再刪除帳戶。');
            } else {
              alert('刪除失敗：' + error.message);
            }
          });
      }
    };
  </script>
</body>
</html>
