<!DOCTYPE html>
<html lang="zh-HK">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>花子先生網校 - 線上教室登入</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      font-family:"PingFang HK","Noto Sans TC","微軟正黑體",sans-serif;
      /* 背景使用 D48A3F 漸變色 */
      background: linear-gradient(135deg, #D48A3F 0%, #E9B47E 100%);
      min-height:100vh;
      padding:24px;
      display:flex;
      justify-content:center;
      align-items:center;
      color:#4F3B2D;
      position:relative;
      overflow:hidden;
    }
    
    /* 背景飄浮圖案 */
    .bg-icon {
      position:absolute;
      pointer-events:none;
      font-size:36px;
      color:rgba(255,255,255,0.25);
    }
    .bg-icon.book-open { top:10%; left:8%; }
    .bg-icon.grad-cap { top:8%; right:10%; }
    .bg-icon.pencil { bottom:30%; left:5%; }
    .bg-icon.book-stack { bottom:8%; right:8%; }
    .bg-icon.leaf { bottom:12%; right:5%; }
    .bg-icon.dots { bottom:18%; left:10%; font-size:22px; color:rgba(255,255,255,0.15); }
    .bg-icon.dots2 { top:25%; right:15%; font-size:22px; color:rgba(255,255,255,0.15); }
    .bg-icon.star { top:20%; right:20%; font-size:28px; }

    .container { width:100%; max-width:430px; z-index:1; }
    
    /* 框框轉成順眼的粉藍色 */
    .login-card {
      background:#E3F2FD;
      padding:40px 32px 32px;
      border-radius:20px;
      box-shadow:0 10px 30px rgba(0,0,0,0.15);
      text-align:center;
    }
    
    /* 粉紅色立體字：線上教室 3D 效果 */
    h1 {
      color: #ff6b8b; 
      font-size:42px;
      font-weight:700;
      margin-bottom:24px;
      position:relative;
      letter-spacing: 2px;
      text-shadow: 
        0 1px 0 #ff477e,
        0 2px 0 #ff3366,
        0 3px 0 #e61a5c,
        0 4px 0 #cc0044,
        0 5px 6px rgba(0,0,0,0.25);
    }
    
    .input-group {
      margin:16px 0;
      position:relative;
    }
    input {
      width:100%;
      padding:16px 48px 16px 48px;
      border:1px solid #bbdefb;
      border-radius:10px;
      font-size:16px;
      background:#fff;
      color:#4F3B2D;
    }
    .input-group .icon {
      position:absolute;
      left:16px;
      top:50%;
      transform:translateY(-50%);
      color:#999;
      font-size:18px;
    }
    .input-group .eye-icon {
      right:16px;
      left:auto;
      cursor:pointer;
      user-select:none;
      font-size:18px;
    }
    .forgot-link {
      display:block;
      text-align:center;
      color:#1976D2;
      margin:12px 0 24px;
      text-decoration:underline;
      font-size:15px;
    }
    button {
      width:100%;
      padding:16px;
      border:none;
      border-radius:10px;
      font-size:18px;
      font-weight:600;
      cursor:pointer;
      transition:opacity 0.2s;
      margin-bottom:12px;
    }
    .btn-login {
      background:#2A4B7C;
      color:#fff;
    }
    .btn-register {
      background:#fff;
      border: 1px solid #2A4B7C;
      color:#2A4B7C;
    }
    .btn-danger {
      background:#e53935;
      color:white;
    }
    button:hover { opacity:0.9; }
    
    #notice { 
      margin:15px 0 20px; 
      padding:12px; 
      background:#ffffff; 
      border-left: 5px solid #2A4B7C;
      border-radius:4px;
      font-size: 14px;
      color: #555;
      text-align: left;
    }
    #classroom-btn { 
      display:block; 
      margin:20px 0 12px;
      padding:16px; 
      background:#4285F4; 
      color:white; 
      text-align:center; 
      text-decoration:none; 
      border-radius:10px;
      font-weight: bold;
      font-size: 18px;
    }

    /* 藍色框外 下面的小字 */
    .footer-text {
      text-align:center;
      margin-top:32px;
      font-size:14px;
      color:#ffffff;
      line-height:1.75;
      text-shadow: 0 1px 2px rgba(0,0,0,0.2);
    }
  </style>
</head>
<body>
  <!-- 背景裝飾圖案 -->
  <div class="bg-icon book-open">📖</div>
  <div class="bg-icon grad-cap">🎓</div>
  <div class="bg-icon pencil">✏️</div>
  <div class="bg-icon book-stack">📚</div>
  <div class="bg-icon leaf">🌿</div>
  <div class="bg-icon dots">●●●<br>●●●<br>●●●</div>
  <div class="bg-icon dots2">●●<br>●●</div>
  <div class="bg-icon star">✨</div>

  <div class="container">
    <div class="login-card">
      <!-- 粉紅立體標題 -->
      <h1>線上教室</h1>
      
      <!-- 登入與註冊區域 -->
      <div id="login-form">
        <div class="input-group">
          <span class="icon">✉️</span>
          <input type="email" id="email" placeholder="你的電郵">
        </div>
        <div class="input-group">
          <span class="icon">🔒</span>
          <input type="password" id="pwd" placeholder="密碼（至少6位）">
          <span class="icon eye-icon" id="showPwd">👀</span>
        </div>
        <a href="#" onclick="forgotPassword(); return false;" class="forgot-link">忘記密碼？</a>
        <button class="btn-login" onclick="login()">登入</button>
        <button class="btn-register" onclick="register()">註冊新帳號</button>
      </div>

      <!-- 登入成功後的教室區域 -->
      <div id="dashboard" style="display:none;">
        <p style="text-align:center; margin-bottom:15px; color:#2a4b7c; font-weight:bold; font-size:18px;" id="welcome"></p>
        <div id="notice">
          📢 提醒：請檢查網課時間，準時參加！
        </div>
        <a id="classroom-btn" href="https://classroom.google.com/c/Nzk2NzkyNDEyNDkx?cjc=dwgpxthq" target="_blank">
          進入你的課堂
        </a>
        <button class="btn-register" onclick="logout()">登出</button>
        <button class="btn-danger" onclick="deleteAccount()">🗑️ 取消帳戶（永久刪除）</button>
      </div>
    </div>
    
    <!-- 藍色框外 下面的專屬小字 -->
    <div class="footer-text">
      只向本善教育 及 A元智研學生使用<br>花子先生管理
    </div>
  </div>

  <!-- Firebase SDK 模組與核心邏輯 -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
    import { 
      getAuth, 
      signInWithEmailAndPassword, 
      createUserWithEmailAndPassword, 
      signOut, 
      onAuthStateChanged,
      sendPasswordResetEmail,
      deleteUser   
    } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js";

    const firebaseConfig = {
      apiKey: "AIzaSyB58QT_SabVrd4R9FVgwsnkwNlgZwWHChQ",
      authDomain: "auth-53ab7.firebaseapp.com",
      projectId: "auth-53ab7",
      storageBucket: "auth-53ab7.firebasestorage.app",
      messagingSenderId: "277804563457",
      appId: "1:277804563457:web:57123fb83eb8bac3155400"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    // 監聽並自動切換登入前後介面
    onAuthStateChanged(auth, (user) => {
      if (user) {
        document.getElementById('login-form').style.display = 'none';
        document.getElementById('dashboard').style.display = 'block';
        document.getElementById('welcome').textContent = `歡迎回來，${user.email.split('@')[0]}`;
      } else {
        document.getElementById('login-form').style.display = 'block';
        document.getElementById('dashboard').style.display = 'none';
      }
    });

    // 登入功能
    window.login = function() {
      const email = document.getElementById('email').value;
      const password = document.getElementById('pwd').value;
      if (!email || !password) return alert('請填寫電郵和密碼！');
      
      signInWithEmailAndPassword(auth, email, password)
        .catch((error) => alert('登入失敗：' + error.message));
    };

    // 註冊功能
    window.register = function() {
      const email = document.getElementById('email').value;
      const password = document.getElementById('pwd').value;
      if (!email || password.length < 6) return alert('請填寫有效電郵，密碼至少6位！');
      
      createUserWithEmailAndPassword(auth, email, password)
        .then(() => alert('註冊成功！'))
        .catch((error) => alert('註冊失敗：' + error.message));
    };

    // 忘記密碼功能
    window.forgotPassword = function() {
      const email = document.getElementById('email').value;
      if (!email) return alert('請先輸入你的電郵地址');
      
      sendPasswordResetEmail(auth, email)
        .then(() => alert('✅ 重設密碼電郵已發送！\n請檢查你的郵箱。'))
        .catch((error) => alert('發送失敗：' + error.message));
    };

    // 登出功能
    window.logout = function() {
      signOut(auth);
    };

    // 刪除帳戶功能 (修正為 SDK v10+ 的 deleteUser)
    window.deleteAccount = function() {
      if (!confirm('⚠️ 確定要永久刪除你的帳戶嗎？\n此動作無法還原！')) return;
      
      const user = auth.currentUser;
      if (user) {
        deleteUser(user)
          .then(() => alert('帳戶已成功永久刪除。'))
          .catch((error) => {
            if (error.code === 'auth/requires-recent-login') {
              alert('為了安全，請重新登入後再進行刪除操作。');
            } else {
              alert('刪除失敗：' + error.message);
            }
          });
      }
    };
  </script>

  <!-- 眼睛圖案切換密碼顯示狀態腳本 -->
  <script>
    let pwd = document.getElementById('pwd');
    let btn = document.getElementById('showPwd');
    btn.onclick = function(){
      if(pwd.type === 'password'){
        pwd.type = 'text';
        btn.innerText = '👌🏻';
      }else{
        pwd.type = 'password';
        btn.innerText = '👀';
      }
    }
  </script>
</body>
</html>
