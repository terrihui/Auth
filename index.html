<!DOCTYPE html>
<html lang="zh-HK">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>花子先生網校 - 線上教室登入</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      font-family:"PingFang HK","Noto Sans TC","微軟正黑體",sans-serif;
      background: linear-gradient(180deg, #FFA84A 0%, #FFD18A 100%);
      min-height:100vh;
      padding:24px;
      display:flex;
      justify-content:center;
      align-items:center;
      color:#4F3B2D;
      position:relative;
      overflow:hidden;
    }
    /* 改用 SVG 線條圖，用 opacity 控制透明度 */
    .bg-icon {
      position:absolute;
      pointer-events:none;
      opacity:0.08; /* 呢個數值直接控制淡度，比 rgba 更有效 */
      filter: drop-shadow(0 0 0 #fff); /* 強制將圖變白色 */
    }
    .bg-icon svg { width:60px; height:60px; fill:none; stroke:#fff; stroke-width:1.5; }

    /* 分布位置，同你張圖一樣 */
    .bg-icon.book-open { top:8%; left:5%; }
    .bg-icon.grad-cap { top:5%; right:8%; }
    .bg-icon.pencil { bottom:25%; left:3%; }
    .bg-icon.book-stack { bottom:5%; right:5%; }
    .bg-icon.leaf { bottom:10%; right:3%; }
    .bg-icon.dots { bottom:15%; left:8%; font-size:20px; color:#fff; opacity:0.08; }
    .bg-icon.star { top:15%; right:15%; font-size:25px; color:#fff; opacity:0.08; }

    .container { width:100%; max-width:430px; z-index:1; }
    .login-card {
      background:#FFF9F0;
      padding:40px 32px 32px;
      border-radius:20px;
      box-shadow:0 10px 30px rgba(0,0,0,0.1);
      text-align:center;
    }
    h1 {
      color:#1A304E;
      font-size:48px;
      font-weight:700;
      margin-bottom:24px;
      position:relative;
    }
    h1::after {
      content:"";
      width:80px;
      height:1px;
      background:#D48A3F;
      position:absolute;
      bottom:-12px;
      left:50%;
      transform:translateX(-50%);
    }
    h1::before {
      content:"";
      width:6px;
      height:6px;
      background:#D48A3F;
      border-radius:50%;
      position:absolute;
      bottom:-14px;
      left:50%;
      transform:translateX(-50%);
    }
    .input-group {
      margin:16px 0;
      position:relative;
    }
    input {
      width:100%;
      padding:16px 16px 16px 48px;
      border:1px solid #D8D8D8;
      border-radius:10px;
      font-size:16px;
      background:#fff;
      color:#4F3B2D;
    }
    .input-group .icon {
      position:absolute;
      left:16px;
      top:50%;
      transform:translateY(-50%);
      color:#999;
      font-size:18px;
    }
    .input-group .eye-icon {
      right:16px;
      left:auto;
    }
    .forgot-link {
      display:block;
      text-align:center;
      color:#2C5F9E;
      margin:12px 0 24px;
      text-decoration:underline;
      font-size:15px;
    }
    button {
      width:100%;
      padding:16px;
      border:none;
      border-radius:10px;
      font-size:18px;
      font-weight:600;
      cursor:pointer;
      transition:opacity 0.2s;
    }
    .btn-login {
      background:#2A4B7C;
      color:#fff;
      margin-bottom:12px;
    }
    .btn-register {
      background:#DCE4F0;
      color:#2A4B7C;
    }
    button:hover { opacity:0.9; }
    .footer-text {
      text-align:center;
      margin-top:32px;
      font-size:14px;
      color:#4F3B2D;
      line-height:1.75;
    }
  </style>
</head>
<body>
  <!-- 改用 SVG 線條圖，淡度由 opacity 控制 -->
  <div class="bg-icon book-open">
    <svg viewBox="0 0 24 24">
      <path d="M12 2v20M4 4h16v16H4z"/>
      <path d="M4 4c4 0 8 2 8 2s4-2 8-2M4 20c4 0 8-2 8-2s4 2 8 2"/>
    </svg>
  </div>
  <div class="bg-icon grad-cap">
    <svg viewBox="0 0 24 24">
      <path d="M12 2L2 7l10 5 10-5-10-5z"/>
      <path d="M2 17l10 5 10-5M2 12l10 5 10-5"/>
    </svg>
  </div>
  <div class="bg-icon pencil">
    <svg viewBox="0 0 24 24">
      <path d="M17 3a2.85 2.83 0 1 1 4 4L7.5 20 2 22l1.5-5.5Z"/>
    </svg>
  </div>
  <div class="bg-icon book-stack">
    <svg viewBox="0 0 24 24">
      <path d="M4 19.5v-15A2.5 2.5 0 0 1 6.5 2H20v20H6.5a2.5 2.5 0 0 1 0-5H20"/>
    </svg>
  </div>
  <div class="bg-icon leaf">
    <svg viewBox="0 0 24 24">
      <path d="M11 20A7 7 0 0 1 9.8 6.1C15.5 5 17 4.48 19 2c1 2 2 4.18 2 8 0 5.5-4.78 10-10 10Z"/>
      <path d="M2 21c0-3 1.85-5.36 5.08-6"/>
    </svg>
  </div>
  <div class="bg-icon dots">●●●<br>●●●<br>●●●</div>
  <div class="bg-icon star">✨</div>

  <div class="container">
    <div class="login-card">
      <h1>線上教室</h1>
      <div class="input-group">
        <span class="icon">✉️</span>
        <input type="email" placeholder="你的電郵">
      </div>
      <div class="input-group">
        <span class="icon">🔒</span>
        <input type="password" placeholder="密碼（至少6位）">
        <span class="icon eye-icon">👁️</span>
      </div>
      <a href="#" class="forgot-link">忘記密碼？</a>
      <button class="btn-login">登入</button>
      <button class="btn-register">註冊新帳號</button>
    </div>
    <div class="footer-text">
      只向本善教育 及 A元智研學生使用 花子先生管理
    </div>
  </div>
</body>
</html>
