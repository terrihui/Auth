<!DOCTYPE html>
<html lang="zh-HK">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>花子先生網校</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { 
      font-family:"PingFang HK","Microsoft JhengHei",sans-serif; 
      /* 背景改為 D48A3F 的漸變色 */
      background: linear-gradient(135deg, #D48A3F 0%, #E9B47E 100%); 
      min-height:100vh; 
      padding:20px; 
      display:flex; 
      justify-content:center; 
      align-items:center;
    }
    .box { 
      /* 框框內轉成順眼的粉藍色 */
      background: #E3F2FD; 
      width:100%; 
      max-width:400px; 
      padding:30px; 
      border-radius:15px; 
      box-shadow: 0 10px 25px rgba(0,0,0,0.2);
    }
    h1 { text-align:center; margin-bottom:20px; color:#2c3e50; }
    input { 
      width:100%; 
      padding:12px; 
      margin:10px 0; 
      border:1px solid #bbdefb; 
      border-radius:8px; 
      font-size:16px;
      background: white;
    }
    button { 
      width:100%; 
      padding:12px; 
      background:#34495e; 
      color:white; 
      border:none; 
      border-radius:8px; 
      font-size:16px; 
      cursor:pointer;
      margin:8px 0;
      transition: 0.3s;
    }
    button:hover { background:#2c3e50; opacity: 0.9; }
    button.danger { background:#e53935; }
    button.danger:hover { background:#c62828; }

    .forgot-link {
      display:block;
      text-align:center;
      color:#1976D2;
      margin:10px 0;
      text-decoration:none;
      font-size:14px;
    }
    .forgot-link:hover { text-decoration:underline; }

    #notice { 
      margin:15px 0; 
      padding:12px; 
      background:#ffffff; 
      border-left: 5px solid #4285F4;
      border-radius:4px;
      font-size: 14px;
      color: #555;
    }
    #classroom-btn { 
      display:block; 
      margin:20px 0 10px;
      padding:12px; 
      background:#4285F4; 
      color:white; 
      text-align:center; 
      text-decoration:none; 
      border-radius:8px;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <div class="box">
    <h1>花子先生網校</h1>
    
    <div id="login">
      <input type="email" id="email" placeholder="你的電郵">
      <input type="password" id="password" placeholder="密碼（至少6位）">
      <button onclick="login()">登入</button>
      <a href="#" onclick="forgotPassword(); return false;" class="forgot-link">忘記密碼？</a>
      <button onclick="register()" style="background:#78909c;">註冊新帳號</button>
    </div>

    <div id="dashboard" style="display:none;">
      <p style="text-align:center; margin-bottom:15px; color:#2c3e50; font-weight:bold;" id="welcome"></p>
      <div id="notice">
        📢 提醒：明天 19:00 有數學課，請準時參加！
      </div>
      <a id="classroom-btn" href="https://classroom.google.com/c/Nzk2NzkyNDEyNDkx?cjc=dwgpxthq" target="_blank">
        進入你的課堂
      </a>
      <button onclick="logout()">登出</button>
      <button onclick="deleteAccount()" class="danger">🗑️ 取消帳戶（永久刪除）</button>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
    import { 
      getAuth, 
      signInWithEmailAndPassword, 
      createUserWithEmailAndPassword, 
      signOut, 
      onAuthStateChanged,
      sendPasswordResetEmail,
      deleteUser   
    } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js";

    const firebaseConfig = {
      apiKey: "AIzaSyB58QT_SabVrd4R9FVgwsnkwNlgZwWHChQ",
      authDomain: "auth-53ab7.firebaseapp.com",
      projectId: "auth-53ab7",
      storageBucket: "auth-53ab7.firebasestorage.app",
      messagingSenderId: "277804563457",
      appId: "1:277804563457:web:57123fb83eb8bac3155400"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    onAuthStateChanged(auth, (user) => {
      if (user) {
        document.getElementById('login').style.display = 'none';
        document.getElementById('dashboard').style.display = 'block';
        document.getElementById('welcome').textContent = `歡迎回來，${user.email.split('@')[0]}`;
      } else {
        document.getElementById('login').style.display = 'block';
        document.getElementById('dashboard').style.display = 'none';
      }
    });

    window.login = function() {
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      if (!email || !password) return alert('請填寫電郵和密碼！');
      signInWithEmailAndPassword(auth, email, password)
        .catch((error) => alert('登入失敗：' + error.message));
    };

    window.register = function() {
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      if (!email || password.length < 6) return alert('請填寫有效電郵，密碼至少6位！');
      createUserWithEmailAndPassword(auth, email, password)
        .then(() => alert('註冊成功！'))
        .catch((error) => alert('註冊失敗：' + error.message));
    };

    window.forgotPassword = function() {
      const email = document.getElementById('email').value;
      if (!email) return alert('請先輸入你的電郵地址');
      sendPasswordResetEmail(auth, email)
        .then(() => alert('✅ 重設電郵已發送！'))
        .catch((error) => alert('發送失敗：' + error.message));
    };

    window.logout = function() {
      signOut(auth);
    };

    window.deleteAccount = function() {
      if (!confirm('⚠️ 確定要永久刪除帳戶嗎？此動作無法復原。')) return;
      const user = auth.currentUser;
      if (user) {
        deleteUser(user)
          .then(() => alert('帳戶已刪除。'))
          .catch((error) => {
            if (error.code === 'auth/requires-recent-login') {
              alert('為了安全，請重新登入後再進行刪除操作。');
            } else {
              alert('失敗：' + error.message);
            }
          });
      }
    };
  </script>
</body>
</html>
