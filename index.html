<!DOCTYPE html>
<html lang="zh-HK">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>花子先生網校 - 線上教室登入</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      font-family:"PingFang HK","Noto Sans TC","微軟正黑體",sans-serif;
      background: linear-gradient(180deg, #FFA84A 0%, #FFD18A 100%);
      min-height:100vh;
      padding:24px;
      display:flex;
      justify-content:center;
      align-items:center;
      color:#4F3B2D;
      position:relative;
      overflow:hidden;
    }
    .bg-icon {
      position:absolute;
      pointer-events:none;
      font-size:36px;
      color:rgba(255,255,255,0.015);
      filter:grayscale(100%);
    }
    .bg-icon.book-open { top:10%; left:8%; }
    .bg-icon.grad-cap { top:8%; right:10%; }
    .bg-icon.pencil { bottom:30%; left:5%; }
    .bg-icon.book-stack { bottom:8%; right:8%; }
    .bg-icon.leaf { bottom:12%; right:5%; }
    .bg-icon.dots { bottom:18%; left:10%; font-size:22px; }
    .bg-icon.dots2 { top:25%; right:15%; font-size:22px; }
    .bg-icon.star { top:20%; right:20%; font-size:28px; }

    .container { width:100%; max-width:430px; z-index:1; }
    .login-card {
      background:#FFF9F0;
      padding:40px 32px 32px;
      border-radius:20px;
      box-shadow:0 10px 30px rgba(0,0,0,0.1);
      text-align:center;
    }
    h1 {
      color:#1A304E;
      font-size:48px;
      font-weight:700;
      margin-bottom:24px;
      position:relative;
    }
    h1::after {
      content:"";
      width:80px;
      height:1px;
      background:#D48A3F;
      position:absolute;
      bottom:-12px;
      left:50%;
      transform:translateX(-50%);
    }
    h1::before {
      content:"";
      width:6px;
      height:6px;
      background:#D48A3F;
      border-radius:50%;
      position:absolute;
      bottom:-14px;
      left:50%;
      transform:translateX(-50%);
    }
    .input-group {
      margin:16px 0;
      position:relative;
    }
    input {
      width:100%;
      padding:16px 16px 16px 48px;
      border:1px solid #D8D8D8;
      border-radius:10px;
      font-size:16px;
      background:#fff;
      color:#4F3B2D;
    }
    .input-group .icon {
      position:absolute;
      left:16px;
      top:50%;
      transform:translateY(-50%);
      color:#999;
      font-size:18px;
    }
    .input-group .eye-icon {
      right:16px;
      left:auto;
      cursor:pointer;
      user-select:none;
      font-size:18px;
    }
    .forgot-link {
      display:block;
      text-align:center;
      color:#2C5F9E;
      margin:12px 0 24px;
      text-decoration:underline;
      font-size:15px;
    }
    button {
      width:100%;
      padding:16px;
      border:none;
      border-radius:10px;
      font-size:18px;
      font-weight:600;
      cursor:pointer;
      transition:opacity 0.2s;
    }
    .btn-login {
      background:#2A4B7C;
      color:#fff;
      margin-bottom:12px;
    }
    .btn-register {
      background:#DCE4F0;
      color:#2A4B7C;
    }
    button:hover { opacity:0.9; }
    .footer-text {
      text-align:center;
      margin-top:32px;
      font-size:14px;
      color:#4F3B2D;
      line-height:1.75;
    }
  </style>
</head>
<body>
  <div class="bg-icon book-open">📖</div>
  <div class="bg-icon grad-cap">🎓</div>
  <div class="bg-icon pencil">✏️</div>
  <div class="bg-icon book-stack">📚</div>
  <div class="bg-icon leaf">🌿</div>
  <div class="bg-icon dots">●●●<br>●●●<br>●●●</div>
  <div class="bg-icon dots2">●●<br>●●</div>
  <div class="bg-icon star">✨</div>

  <div class="container">
    <div class="login-card">
      <h1>線上教室</h1>
      <div class="input-group">
        <span class="icon">✉️</span>
        <input type="email" placeholder="你的電郵">
      </div>
      <div class="input-group">
        <span class="icon">🔒</span>
        <input type="password" id="pwd" placeholder="密碼（至少6位）">
        <span class="icon eye-icon" id="showPwd">👀</span>
      </div>
      <a href="#" class="forgot-link">忘記密碼？</a>
      <button class="btn-login">登入</button>
      <button class="btn-register">註冊新帳號</button>
    </div>
    <div class="footer-text">
      只向本善教育 及 A元智研學生使用 花子先生管理
    </div>
  </div>

<script>
let pwd = document.getElementById('pwd');
let btn = document.getElementById('showPwd');
btn.onclick = function(){
  if(pwd.type === 'password'){
    pwd.type = 'text';
    btn.innerText = '👌🏻';
  }else{
    pwd.type = 'password';
    btn.innerText = '👀';
  }
}
</script>
</body>
</html>
